<script>
function saveText() {
    const textValue = document.querySelector('textarea').value;
    if(textValue.trim() === "") {
        alert("Pehle kuch likho toh sahi, Virat!");
        return;
    }
    // Browser ki memory mein text save kar raha hai
    localStorage.setItem('viratSavedText', textValue);
    alert('AI: Project Saved Successfully!');
    // 4th page par le jane ke liye
    window.location.href = "saved_projects.html";
}

// Apne Save Button mein 'onclick' zaroori hai
document.querySelector('.btn-save').setAttribute('onclick', 'saveText()');
</script>
