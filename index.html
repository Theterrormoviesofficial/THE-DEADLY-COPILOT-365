<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Deadly Copilot - Virat Nain</title>
    <style>
        /* Modern Pro Background */
        body {
            background: radial-gradient(circle at center, #0078d4 0%, #001e36 100%);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        /* Neon Glowing Text */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #0078d4, 0 0 20px #0078d4, 0 0 40px #0078d4;
            animation: pulse 2s infinite;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        /* 3D Launch Button */
        .launch-btn {
            display: inline-block;
            background: #ffaa00;
            color: #001e36;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 8px 0 #cc8800;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        /* Clicking effect */
        .launch-btn:active {
            box-shadow: 0 2px 0 #cc8800;
            transform: translateY(6px);
        }

        .launch-btn:hover {
            background: #ffbc33;
            transform: scale(1.05);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #0078d4; }
            50% { transform: scale(1.02); text-shadow: 0 0 25px #0078d4; }
            100% { transform: scale(1); text-shadow: 0 0 10px #0078d4; }
        }
    </style>
</head>
<body>

    <div class="container">
        <p style="letter-spacing: 2px;">WELCOME TO THE FUTURE</p>
        <h1>VIRAT NAIN</h1>
        <p>THE DEADLY COPILOT 365</p>
        
        <a href="Presentation.html" class="launch-btn">🚀 LAUNCH PORTAL</a>
    </div>

</body>
</html>
